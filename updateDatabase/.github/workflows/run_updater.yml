name: Trivio Tag Updater

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tag updater script
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python tag_updater.py
